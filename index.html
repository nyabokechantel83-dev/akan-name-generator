<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akan Name Generator</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Akan Name Generator</h1>
    <p>Discover your Akan name based on your date of birth and Ghanaian tradition</p>
  </header>

  <!-- FORM -->
  <form id="akan-form">

    <label for="day">Day of Birth</label>
    <input type="number" id="day" min="1" max="31" required>

    <label for="month">Month of Birth</label>
    <input type="number" id="month" min="1" max="12" required>

    <label for="year">Year of Birth</label>
    <input type="number" id="year" required>

    <label for="gender">Gender</label>
    <select id="gender" required>
      <option value="">Select gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <button type="submit">Get Akan Name</button>

  </form>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
