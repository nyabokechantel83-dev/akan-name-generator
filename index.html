<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akan Generator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <h1>AKAN NAME GENERATOR</h1>
    <p>A web app that calculates birth day and assigns an Akan name by gender.</p>
  </header>

  <!-- Form Section -->
  <form id="akan-form">

    <!-- Day -->
    <label>Day of Birth</label>
    <input type="number" id="day" placeholder="DD" min="1" max="31" required>

    <!-- Month -->
    <label>Month of Birth</label>
    <input type="number" id="month" placeholder="MM" min="1" max="12" required>

    <!-- Year -->
    <label>Year of Birth</label>
    <input type="number" id="year" placeholder="YYYY" min="1900" max="2100" required>

    <!-- Gender -->
    <label>Gender</label>
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <!-- Button -->
    <button type="submit">Get Akan Name</button>

  </form>

  <!-- Result -->
  <div id="result" class="result-box"></div>

  <!-- JavaScript link -->
  <script src="js/script.js"></script>

</body>
</html>
